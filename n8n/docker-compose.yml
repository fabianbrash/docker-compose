services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: always
    environment:
      - N8N_HOST=n8n.fbclouddemo.us
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.fbclouddemo.us/
      - N8N_SECURE_COOKIE=true
      - GENERIC_TIMEZONE=America/New_York
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.fbclouddemo.us`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls=true"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true

volumes:
  n8n_data:
    external: true
